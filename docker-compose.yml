services:
  scoreboard:
    # Pull the prebuilt image from GitHub Container Registry.
    # Published automatically by .github/workflows/docker.yml on every push
    # to main. To pin a version, replace `:latest` with a tag like
    # `:1.0.0` or a commit SHA. See https://github.com/Kylo94/Classroom-Scoreboard/pkgs/container/scoreboard
    #
    # To build from local source instead, replace the `image:` line with:
    #   build:
    #     context: .
    #     dockerfile: Dockerfile
    image: ghcr.io/kylo94/scoreboard:latest
    container_name: scoreboard
    restart: unless-stopped
    ports:
      - "8043:8000"
    volumes:
      # Persist the SQLite database on the host so it survives container
      # restarts and image upgrades.
      - ./vol1/@appshare/classroom.data:/app/data
    environment:
      # Override DB location to live in the mounted volume.
      - SCOREBOARD_DB=/app/data/scoreboard.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s